<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - ELI Coffee Events Cafe</title>
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/login_signup.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar__container">
      <a href="/index.html">
        <img class="logo" src="/images/logo.png" alt="ELI Coffee Events Cafe Logo">
      </a>
      <div class="navbar__toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <ul class="navbar__menu">
        <li class="navbar__item"><a href="/index.html" class="navbar__links">Home</a></li>
        <li class="navbar__item"><a href="/packages.html" class="navbar__links">Packages</a></li>
        <li class="navbar__item"><a href="/reservations.html" class="navbar__links">Reservations</a></li>
        <li class="navbar__item"><a href="/faqs.html" class="navbar__links">FAQs</a></li>
        <li class="navbar__item"><a href="/about.html" class="navbar__links">About</a></li>
        <li class="navbar__btn"></li>
      </ul>
    </div>
  </nav>

  <div class="login-page">
    <div class="login-container">
      <div class="login-logo">
        <span class="coffee-icon">â˜•</span>
        <h1>Create a New Password</h1>
      </div>

      <p class="welcome">
        Choose a new password for your account.<br>
        <span>This page works only when opened from the reset email link.</span>
      </p>

      <form class="login-form active" id="reset-password-form">
        <h2>Set New Password</h2>
        <p class="subtitle">Your new password must be at least 8 characters long</p>

        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" placeholder="Enter new password" required>
        </div>

        <div class="form-group">
          <label for="confirm-new-password">Confirm New Password</label>
          <input type="password" id="confirm-new-password" placeholder="Confirm new password" required>
        </div>

        <button type="submit" class="login-btn">Update Password</button>

        <p class="admin-link">
          Want to sign in instead? <a href="/login.html">Back to Login</a>
        </p>

        <p class="form-msg" id="reset-password-msg"></p>
      </form>
    </div>
  </div>

  <script type="module" src="/js/reset_password.js"></script>
  <script type="module" src="/js/navbar.js"></script>
</body>
</html>
