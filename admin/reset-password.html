<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create a New Portal Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/portal_password.css">
</head>
<body>
  <div class="top-bar">ELI Coffee Events Management System &mdash; Staff, Admin, and Super Admin Portal</div>

  <main class="portal-page">
    <section class="portal-card">
      <div class="portal-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l6 2.67V11c0 3.88-2.62 7.5-6 8.93C8.62 18.5 6 14.88 6 11V7.67L12 5z"/>
        </svg>
      </div>

      <div class="portal-copy">
        <p class="portal-eyebrow">Portal Access</p>
        <h1>Create a New Password</h1>
        <p class="portal-subtitle">
          Choose a new password for your portal account.
          <span>This page works only when opened from the reset email link.</span>
        </p>
      </div>

      <form class="portal-form" id="portal-reset-password-form">
        <div class="form-group">
          <label for="portal-new-password">New Password</label>
          <input type="password" id="portal-new-password" placeholder="Enter new password" required>
        </div>

        <div class="form-group">
          <label for="portal-confirm-new-password">Confirm New Password</label>
          <input type="password" id="portal-confirm-new-password" placeholder="Confirm new password" required>
        </div>

        <button type="submit" class="portal-btn">Update Password</button>

        <p class="portal-link">
          Want to sign in instead? <a href="/admin">Back to Portal Login</a>
        </p>

        <p class="form-msg" id="portal-reset-password-msg"></p>
      </form>
    </section>
  </main>

  <script type="module" src="/js/portal_reset_password.js"></script>
</body>
</html>
