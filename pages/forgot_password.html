<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ELI Coffee Events Cafe</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/forgot_password.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar__container">
      <a href="../index.html">
        <img class="logo" src="../images/logo.png" alt="ELI Coffee Events Cafe Logo">
      </a>
      <div class="navbar__toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <ul class="navbar__menu">
        <li class="navbar__item"><a href="../index.html" class="navbar__links">Home</a></li>
        <li class="navbar__item"><a href="../pages/packages.html" class="navbar__links">Packages</a></li>
        <li class="navbar__item"><a href="../pages/reservations.html" class="navbar__links">Reservations</a></li>
        <li class="navbar__item"><a href="../pages/faqs.html" class="navbar__links">FAQs</a></li>
        <li class="navbar__item"><a href="../pages/about.html" class="navbar__links">About</a></li>
        <li class="navbar__btn"></li>
      </ul>
    </div>
  </nav>

  <div class="login-page">
    <div class="login-container">
      <div class="login-logo">
        <h1>Reset Your Password</h1>
      </div>

      <p class="welcome">
        Enter the email address linked to your account.<br>
        <span>We will send you a password reset link.</span>
      </p>

      <form class="login-form active" id="forgot-password-form">
       
        <div class="form-group">
          <label for="reset-email">Email Address</label>
          <input type="email" id="reset-email" placeholder="your.email@example.com" required>
        </div>

        <button type="submit" class="login-btn">Send Reset Link</button>

        <p class="admin-link">
          Remembered your password? <a href="../pages/login_signup.html">Back to Login</a>
        </p>

        <p class="form-msg" id="forgot-password-msg"></p>
      </form>
    </div>
  </div>

  <script type="module" src="../js/forgot_password.js"></script>
  <script type="module" src="../js/navbar.js"></script>
</body>
</html>
